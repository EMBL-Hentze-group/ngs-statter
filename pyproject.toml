[build-system]
requires = ["maturin>=1.4,<2.0"]
build-backend = "maturin"

[project]
name = "statter"
requires-python = ">=3.8"
dependencies = [
    "bokeh >= 3.2.2",
    "click >= 8.1.0",
    "pandas >= 2.1.0",
    "pysam >= 0.21.0",
    "jsonschema >= 4.20.0",
    "networkx >= 3.0"
]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
dynamic = ["version"]

[project.scripts]
read_length_parser = "statter.scripts.read_length_stats:read_length_parser"
read_length_plotter = "statter.scripts.read_length_stats:read_length_plotter"
alignment_stats_STAR = "statter.scripts.bam_stats:alignment_stats_STAR"
gene_type_read_length_parser = "statter.scripts.bam_stats:gene_type_read_length_stats"
gene_type_read_length_plotter = "statter.scripts.bam_stats:gene_type_length_plotter"
unmapped_fastq_single_end = "statter.scripts.unmapped_splitter:unmapped_fastq_single_end"
ganon_unc_to_fastq = "statter.scripts.ganon_parser:unclassifed_read_parser"
ganon_read_length_plotter = "statter.scripts.ganon_parser:ganon_read_length_plotter"
ganon_abundance_aggregator = "statter.scripts.ganon_parser:ganon_abundance_aggregator"
kraken_report_aggregator = "statter.scripts.kraken_parser:kraken_report_aggregator"
fastp_stats_aggregator = "statter.scripts.read_length_stats:fastp_stats_aggregator"


[tool.setuptools.packages]
find = {}

[tool.maturin]
features = ["pyo3/extension-module"]
module-name = "statter"
